# nginx vhost for insure-agent.teqcon.uk
# Place at /etc/nginx/sites-available/insure-agent.teqcon.uk and symlink:
#   sudo ln -sf /etc/nginx/sites-available/insure-agent.teqcon.uk \
#               /etc/nginx/sites-enabled/insure-agent.teqcon.uk
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS: add an A record  insure-agent.teqcon.uk -> 167.179.88.55

server {
    listen 80;
    server_name insure-agent.teqcon.uk;

    # Allow large request bodies (the model sometimes pastes long prompts).
    client_max_body_size 4M;

    location / {
        proxy_pass http://127.0.0.1:7008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE — keep connections open and DO NOT buffer chunks. Without these
        # the chat UI sees nothing until the whole agent run finishes.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # WebSocket-style upgrade (not strictly used yet but harmless and
        # matches the existing teqcon vhost pattern).
        proxy_set_header Upgrade $http_upgrade;
        # only set Connection: upgrade if the client asked for it; otherwise
        # the empty Connection above keeps SSE happy.
    }
}
